services:
  study-hard:
    image: studyhard:1.0.2
    container_name: study-hard-app
    restart: always
    env_file: env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://dev:3306/study-hard #
      SPRING_DATA_REDIS_HOST: redisStudyHard
      SPRING_DATA_MONGODB_URI: mongodb://mongoBiladen:27017/study-hard
      APP_UPLOAD_DIR: /app/storage
    depends_on:
      - dev
      - redisStudyHard
      - mongoBiladen
    ports:
      - "8090:8090"
    volumes:
      - /data/uploads:/app/storage # Kho lưu ảnh trên VPS
    networks:
      - studyhard

  dev:
    image: mysql:latest
    container_name: study-hard-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: study-hard
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - studyhard
  redisStudyHard:
    image: redis:latest
    container_name: study-hard-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - studyhard
  mongoBiladen:
    image: mongo:latest
    container_name: mongoBiladen
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - studyhard

  biladenweb:
    image: qdrant/qdrant:latest
    container_name: biladenweb
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - studyhard

volumes:
  mysql_data:
  redis_data:
  mongo_data:
  qdrant_data:

networks:
  studyhard:
    external: true