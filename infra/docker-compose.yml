
services:
  study-hard:
    image: studyhardweb:1.0.1
    container_name: study-hard-app
    env_file: env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/study-hard
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      - mysql
      - redis
    ports:
      - "8090:8090"
    networks:
      - studyhard
  mysql:
    image: mysql:latest
    container_name: study-hard-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: study-hard
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - studyhard

  redis:
    image: redis:latest
    container_name: study-hard-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - studyhard

volumes:
  mysql_data:
  redis_data:

networks:
  studyhard:
    external: true