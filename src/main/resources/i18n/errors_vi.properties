REFRESH_TOKEN_MISSING = Refresh token là bắt buộc để truy cập tài nguyên này.
INVALID_TOKEN = Token không hợp lệ.
INVALID_OTP = Mã OTP không hợp lệ hoặc đã hết hạn.
USERNAME_NOT_FOUND = Tên đăng nhập không tồn tại. Vui lòng kiểm tra lại hoặc tạo tài khoản mới.
USERNAME_EXISTS = Tên đăng nhập đã được sử dụng. Vui lòng chọn tên khác.
PASSWORD_NOT_MATCH = Mật khẩu không khớp. Vui lòng thử lại.
CATEGORY_NOT_FOUND= Không tìm thấy danh mục yêu cầu.
CONTENT_NOT_FOUND= Nội dung không tồn tại
UNAUTHORIZE_CONTENT_ACCESS= Truy cập bị từ chối. Bạn không có quyền xem nội dung này.
CONTENT_ALREADY_YOUR_CAR= Nội dung này đã có trong giỏ hàng.
CONTENT_REVIEW_OR_REJECTION= Nội dung đang được xem xét hoặc đã bị từ chối.