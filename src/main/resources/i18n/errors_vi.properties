REFRESH_TOKEN_MISSING = Refresh token là bắt buộc để truy cập tài nguyên này.
INVALID_TOKEN = Token không hợp lệ.
INVALID_OTP = Mã OTP không hợp lệ hoặc đã hết hạn.
USERNAME_NOT_FOUND = Tên đăng nhập không tồn tại. Vui lòng kiểm tra lại hoặc tạo tài khoản mới.
USERNAME_EXISTS = Tên đăng nhập đã được sử dụng. Vui lòng chọn tên khác.
PASSWORD_NOT_MATCH = Mật khẩu không khớp. Vui lòng thử lại.
CATEGORY_NOT_FOUND= Không tìm thấy danh mục yêu cầu.
CONTENT_NOT_FOUND= Nội dung không tồn tại
UNAUTHORIZE_CONTENT_ACCESS= Truy cập bị từ chối. Bạn không có quyền xem nội dung này.
CONTENT_ALREADY_YOUR_CAR= Nội dung này đã có trong giỏ hàng.
CONTENT_REVIEW_OR_REJECTION= Nội dung đang được xem xét hoặc đã bị từ chối,đăng tải.
MINIMUM_WITHDRAWAL_NOT_FULFILL= Số tiền rút không đủ yêu cầu tối thiểu là {0} tín dụng. Vui lòng đảm bảo số tiền rút lớn hơn mức tối thiểu.
WALLET_NOT_FOUND= Ví không tồn tại.
INSUFFICIENT_BALANCE= Số dư của bạn không đủ để hoàn thành giao dịch này.
PENDING_WITHDRAWAL_EXISTS= Bạn có một yêu cầu rút tiền đang chờ xử lý. Vui lòng chờ yêu cầu trước được xử lý xong trước khi thực hiện yêu cầu rút tiền khác.
WITHDRAWAL_NOT_EXIST= Yêu cầu rút tiền với ID {0} không tồn tại
WITHDRAWAL_NOT_AUTHORIZE= Bạn không có quyền xem yêu cầu rút tiền này.
WITHDRAWAL_ALREADY_PROCESSED= Lỗi này xảy ra khi một yêu cầu rút tiền đã được xử lý.

CONTENT_NO_REVIEW= Nội dung chưa được xem xét
CONTENT_CAN_NOT_SUMMIT= Nội dung đã được duyệt hoặc bị từ chối
PARENT_BLOCK_NOT_IN_SAME_CONTENT= Block cha và con không cùng một nội dung
BLOCK_NOT_FOUND= Block không tồn tại
INVALID_ANSWER= Đã xảy ra lỗi khi xử lý phản hồi từ AI. Vui lòng thử lại.
ROLE_NOT_FOUND= Lỗi cấu hình quyền hạn hệ thống. Vui lòng liên hệ quản trị viên.
CONTENT_NOT_EXIST_IN_CART=Không tìm thấy sản phẩm này trong giỏ hàng. Vui lòng kiểm tra lại.
SELF_PURCHASE_NOT_ALLOWED= Bạn không thể tự mua sản phẩm của chính mình.
CONTENT_ALREADY_PUBLISHED=Nội dung này đã miễn phí.
CONTENT_IS_PURCHASED=Nội dung này đã được mua
CONTENT_IS_PREMIUM= Content này bắt buộc phải mua
SUPPORT_TICKET_IS_WAITING_RESPONSE=Vé đang chờ phản hồi
SUPPORT_TICKET_IS_RESOLVED=Ticket hỗ trợ đã được giải quyết
SUPPORT_TICKET_IS_REJECTED=Ticket hỗ trợ đã bị từ chối
SUPPORT_TICKET_IS_PENDING_RESOLVED=Ticket hỗ trợ đang được giải quyết
SUPPORT_STAFF_NOT_AVAILABLE=Nhân viên của tôi hiện tại không có mặt .
EMAIL_ALREADY_EXISTS=Email này đã được đăng ký. Vui lòng sử dụng email khác hoặc đăng nhập.
NICK_NAME_ALREADY_EXIST=Nickname already exist
NICK_NAME_NOT_FOUND= Creator not exist or no update profile
USER_HAS_BEEN_CREATOR=User has already been a creator. You cannot perform this action again.